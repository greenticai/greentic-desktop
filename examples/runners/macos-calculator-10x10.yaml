id: example.macos.calculator.10x10
name: macOS Calculator 10 x 10
version: 0.1.0
mode: HumanDemonstration
description: Open the local macOS Calculator app, enter 10 * 10, and return the displayed result.
target:
  kind: desktop
  app: Calculator
required_capabilities:
  - macos.activate_app
  - macos.press_shortcut
  - macos.type_text
  - macos.read_text
inputs: []
secrets: []
outputs:
  - outputs.result
assertions: []
open_questions: []
steps:
  - id: open-calculator
    action: activate_app
    required_capability: macos.activate_app
    value: Calculator

  - id: new-calculator-window
    action: press_shortcut
    required_capability: macos.press_shortcut
    value: Cmd+N

  - id: clear-calculator
    action: type_text
    required_capability: macos.type_text
    value: "c"

  - id: enter-expression
    action: type_text
    required_capability: macos.type_text
    value: "10*10="

  - id: read-result
    action: read_text
    required_capability: macos.read_text
    value: outputs.result
    target:
      preferred:
        role: static text
        name: "100"
      fallback:
        text: "100"
