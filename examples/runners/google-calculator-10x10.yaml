id: example.google.calculator.10x10
name: Google Calculator 10 x 10
version: 0.1.0
mode: HumanDemonstration
description: Open Google Calculator, enter 10 * 10, read the calculated result.
target:
  kind: web
  app: Google Search
required_capabilities:
  - web.goto
  - web.click
  - web.press
  - web.extract_text
inputs: []
secrets: []
outputs:
  - outputs.result
assertions:
  - outputs.result is 100
open_questions: []
steps:
  - id: open-google-calculator
    action: goto
    required_capability: web.goto
    value: "https://www.google.com/search?q=calculator"
    target:
      preferred:
        role: document
        name: Google Search

  - id: focus-calculator
    action: click
    required_capability: web.click
    target:
      preferred:
        role: application
        name: Calculator
      fallback:
        text: Calculator

  - id: enter-first-digit
    action: press
    required_capability: web.press
    value: "1"

  - id: enter-second-digit
    action: press
    required_capability: web.press
    value: "0"

  - id: enter-multiply
    action: press
    required_capability: web.press
    value: "*"

  - id: enter-third-digit
    action: press
    required_capability: web.press
    value: "1"

  - id: enter-fourth-digit
    action: press
    required_capability: web.press
    value: "0"

  - id: submit-calculation
    action: press
    required_capability: web.press
    value: Enter

  - id: read-result
    action: extract_text
    required_capability: web.extract_text
    target:
      preferred:
        role: textbox
        name: Result
      fallback:
        text: "100"
