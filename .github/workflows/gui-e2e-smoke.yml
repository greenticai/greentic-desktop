name: GUI E2E Smoke

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: gui-e2e-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    env:
      CARGO_HTTP_MULTIPLEXING: "false"
      CARGO_HTTP_TIMEOUT: "120"
      CARGO_NET_RETRY: "10"
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/automate-hub/package-lock.json
      - name: Install frontend dependencies
        shell: bash
        run: npm --prefix frontend/automate-hub ci
      - name: Install Playwright browser
        shell: bash
        run: |
          cd frontend/automate-hub
          npx playwright install chromium
      - name: Run GUI smoke E2E
        shell: bash
        run: bash ci/gui_e2e_smoke.sh
      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gui-e2e-smoke-${{ matrix.os }}
          path: |
            frontend/automate-hub/playwright-report
            frontend/automate-hub/test-results
          if-no-files-found: ignore

