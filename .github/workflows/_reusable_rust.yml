name: Reusable Rust

on:
  workflow_call:
    inputs:
      command:
        required: true
        type: string

jobs:
  rust:
    runs-on: ubuntu-latest
    env:
      CARGO_HTTP_MULTIPLEXING: "false"
      CARGO_HTTP_TIMEOUT: "120"
      CARGO_NET_RETRY: "10"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/automate-hub/package-lock.json
      - name: Install Linux native automation dependencies
        run: bash ci/install_linux_native_deps.sh
      - name: Install frontend automation dependencies
        run: |
          cd frontend/automate-hub
          npm ci
          npx playwright install --with-deps chromium
      - uses: Swatinem/rust-cache@v2
      - name: Run command
        shell: bash
        run: ${{ inputs.command }}
