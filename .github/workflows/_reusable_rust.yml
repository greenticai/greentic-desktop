name: Reusable Rust

on:
  workflow_call:
    inputs:
      command:
        required: true
        type: string

jobs:
  rust:
    runs-on: ubuntu-latest
    env:
      CARGO_HTTP_MULTIPLEXING: "false"
      CARGO_HTTP_TIMEOUT: "120"
      CARGO_NET_RETRY: "10"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Install Linux native automation dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libdbus-1-dev \
            libegl1-mesa-dev \
            libpipewire-0.3-dev \
            libwayland-dev \
            libxi-dev \
            libx11-dev \
            libxcb1-dev \
            libxdo-dev \
            libxrandr-dev \
            pkg-config
      - uses: Swatinem/rust-cache@v2
      - name: Run command
        shell: bash
        run: ${{ inputs.command }}
