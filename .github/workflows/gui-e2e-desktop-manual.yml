name: GUI E2E Real Desktop Manual

on:
  workflow_dispatch:
    inputs:
      real_desktop:
        description: Run real desktop automation tests on prepared hosts
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      real_java:
        description: Run real Java accessibility tests on prepared hosts
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      real_llm:
        description: Run real LLM provider tests when secrets are configured
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

concurrency:
  group: gui-e2e-desktop-manual-${{ github.ref }}
  cancel-in-progress: true

jobs:
  real-desktop:
    name: real desktop (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    env:
      CARGO_HTTP_MULTIPLEXING: "false"
      CARGO_HTTP_TIMEOUT: "120"
      CARGO_NET_RETRY: "10"
      GREENTIC_DESKTOP_REAL_DESKTOP: ${{ inputs.real_desktop == 'true' && '1' || '0' }}
      GREENTIC_DESKTOP_REAL_JAVA: ${{ inputs.real_java == 'true' && '1' || '0' }}
      GREENTIC_DESKTOP_REAL_LLM: ${{ inputs.real_llm == 'true' && '1' || '0' }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/automate-hub/package-lock.json
      - name: Install frontend dependencies
        shell: bash
        run: npm --prefix frontend/automate-hub ci
      - name: Install Playwright browser
        shell: bash
        run: |
          cd frontend/automate-hub
          npx playwright install chromium
      - name: Run real desktop E2E
        shell: bash
        run: bash ci/gui_e2e_desktop_manual.sh
      - name: Write release gate report
        if: always()
        shell: bash
        env:
          GREENTIC_E2E_REAL_DESKTOP_STATUS: "${{ inputs.real_desktop == 'true' && job.status || 'skipped' }}"
          GREENTIC_E2E_REAL_JAVA_STATUS: "${{ inputs.real_java == 'true' && job.status || 'skipped' }}"
          GREENTIC_E2E_REAL_LLM_STATUS: "${{ inputs.real_llm == 'true' && job.status || 'skipped' }}"
        run: bash ci/gui_e2e_release_report.sh > gui-e2e-release-report.md
      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gui-e2e-real-desktop-${{ matrix.os }}
          path: |
            gui-e2e-release-report.md
            frontend/automate-hub/playwright-report
            frontend/automate-hub/test-results
          if-no-files-found: ignore

