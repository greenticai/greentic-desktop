name: Desktop Harness

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: desktop-harness-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_HTTP_MULTIPLEXING: "false"
  CARGO_HTTP_TIMEOUT: "120"
  CARGO_NET_RETRY: "10"

jobs:
  unit-matrix:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-unit
            os: windows-latest
            command: cargo test -p greentic-desktop-windows -p greentic-desktop-java -p greentic-desktop-terminal && cargo test -p greentic-desktop-test-harness windows_app_workflow_e2e_installs_extension_and_returns_output && cargo test -p greentic-desktop-test-harness java_app_workflow_e2e_installs_extension_and_returns_output && cargo test -p greentic-desktop-test-harness terminal_workflow_e2e_installs_extension_and_returns_output
          - name: macos-unit
            os: macos-latest
            command: cargo test -p greentic-desktop-macos -p greentic-desktop-platform
          - name: macos-app-workflow-e2e
            os: macos-latest
            command: cargo test -p greentic-desktop-test-harness macos_app_workflow_e2e_installs_extension_and_returns_output
          - name: ubuntu-wayland-detection
            os: ubuntu-latest
            command: cargo test -p greentic-desktop-linux detects_wayland_and_reports_global_restrictions && cargo test -p greentic-desktop-linux wayland_requires_manual_approval_when_portal_is_missing
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux native automation dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libdbus-1-dev \
            libegl1-mesa-dev \
            libpipewire-0.3-dev \
            libwayland-dev \
            libxi-dev \
            libx11-dev \
            libxcb1-dev \
            libxdo-dev \
            libxrandr-dev \
            pkg-config
      - run: ${{ matrix.command }}

  ubuntu-x11-virtual-display:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install X11 native automation dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libdbus-1-dev \
            libegl1-mesa-dev \
            libpipewire-0.3-dev \
            libwayland-dev \
            libxi-dev \
            libx11-dev \
            libxcb1-dev \
            libxdo-dev \
            libxrandr-dev \
            pkg-config \
            xvfb
      - name: Run X11 harness tests
        run: xvfb-run -a cargo test -p greentic-desktop-linux can_detect_x11_session && xvfb-run -a cargo test -p greentic-desktop-linux can_list_windows_and_inspect_at_spi_tree && cargo test -p greentic-desktop-test-harness linux_x11_app_workflow_e2e_installs_extension_and_returns_output

  harness-plan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux native automation dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libdbus-1-dev \
            libegl1-mesa-dev \
            libpipewire-0.3-dev \
            libwayland-dev \
            libxi-dev \
            libx11-dev \
            libxcb1-dev \
            libxdo-dev \
            libxrandr-dev \
            pkg-config
      - run: cargo test -p greentic-desktop-test-harness
